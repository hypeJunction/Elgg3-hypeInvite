services:
  elgg:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - elgg-data:/var/www/data
    environment:
      ELGG_DB_HOST: db
      ELGG_DB_NAME: elgg
      ELGG_DB_USER: elgg
      ELGG_DB_PASS: elgg
      ELGG_SITE_URL: "http://localhost:${ELGG_PORT:?ELGG_PORT must be set (create a .env with ELGG_PORT and DB_PORT, or use bin/elgg-migrate-run)}/"
      ELGG_DATA_ROOT: "/var/www/data/"
      ELGG_ADMIN_EMAIL: "admin@example.com"
      ELGG_ADMIN_PASSWORD: "Admin@12345678901"
    ports:
      - "${ELGG_PORT}:80"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /usr/local/bin/elgg-install.sh

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: elgg
      MYSQL_USER: elgg
      MYSQL_PASSWORD: elgg
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "${DB_PORT:?DB_PORT must be set (create a .env with ELGG_PORT and DB_PORT, or use bin/elgg-migrate-run)}:3306"

  # Node.js + Playwright for running Playwright and Vitest tests inside Docker.
  # Activated via --profile test so it doesn't start with `docker compose up`.
  node:
    image: mcr.microsoft.com/playwright:v1.49.0-noble
    volumes:
      - ${PLUGINS_DIR:?PLUGINS_DIR must be set by the orchestrator}/${PLUGIN_ID:?set PLUGIN_ID to the plugin under test}:/plugins/${PLUGIN_ID}
    working_dir: /plugins/${PLUGIN_ID}
    environment:
      ELGG_BASE_URL: "http://elgg"
      ELGG_PORT: "80"
      ELGG_DB_HOST: db
      ELGG_DB_PORT: "3306"
      ELGG_DB_USER: elgg
      ELGG_DB_PASS: elgg
      ELGG_DB_NAME: elgg
    depends_on:
      - elgg
    profiles:
      - test

volumes:
  elgg-data:
  db-data:
